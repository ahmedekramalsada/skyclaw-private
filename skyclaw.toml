[skyclaw]
mode = "local"

[gateway]
host = "127.0.0.1"
port = 8080
tls = false

[provider]
name = "openrouter"
api_key = "${OPENROUTER_API_KEY}"
model = "anthropic/claude-3.5-sonnet"
# To use Google Gemini instead, change to:
# name = "gemini"
# api_key = "${GOOGLE_API_KEY}"
# model = "gemini-1.5-pro"

[agent]
# max_spend_usd = 0.0  # 0.0 = unlimited (default). Set a value to cap per-process spend.

[memory]
backend = "sqlite"

[memory.search]
vector_weight = 0.7
keyword_weight = 0.3

[vault]
backend = "local-chacha20"

[filestore]
backend = "local"

[security]
sandbox = "mandatory"
file_scanning = true
skill_signing = "required"
audit_log = true

[heartbeat]
enabled = false
interval = "30m"
checklist = "HEARTBEAT.md"
# report_to = ""  # Set to your Telegram chat ID for heartbeat reports

[cron]
storage = "sqlite"

[tools]
shell = true
browser = true
file = true
git = true
cron = true
http = true

[observability]
log_level = "info"
otel_enabled = false

[channel.telegram]
enabled = false
token = "${TELEGRAM_BOT_TOKEN}"
allowlist = []
file_transfer = true
